<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="25"/>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1A1A1A"/>

  <!-- Ambient glow -->
  <ellipse cx="600" cy="250" rx="70" ry="60" fill="#FFCD00" fill-opacity="0.1" filter="url(#glow)"/>

  <!-- Kettlebell -->
  <g transform="translate(600,230) scale(8) translate(-12,-10)" filter="url(#shadow)">
    <!-- Handle (stroke) -->
    <path d="M9 6a3.5 3.5 0 0 1 6 0" fill="none" stroke="#FFCD00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="9" y1="6" x2="9" y2="9.5" stroke="#FFCD00" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="6" x2="15" y2="9.5" stroke="#FFCD00" stroke-width="2" stroke-linecap="round"/>

    <!-- Body (filled) -->
    <circle cx="12" cy="14" r="5.5" fill="#FFCD00"/>

    <!-- Shine highlight -->
    <ellipse cx="10.5" cy="12.5" rx="2" ry="1.5" fill="#FFF" fill-opacity="0.15" transform="rotate(-15,10.5,12.5)"/>
  </g>

  <!-- Title -->
  <text x="600" y="460" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="300" fill="#F5F0E8" letter-spacing="2">Entrecasa Treiner</text>

  <!-- Subtitle -->
  <text x="600" y="510" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="24" font-weight="300" fill="#ABABAB" letter-spacing="0.5">Tu plan de entrenamiento</text>

  <!-- Accent line -->
  <rect x="550" y="530" width="100" height="2" rx="1" fill="#FFCD00" fill-opacity="0.4"/>
</svg>
