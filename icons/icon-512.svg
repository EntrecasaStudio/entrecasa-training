<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40"/>
    </filter>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#1A1A1A"/>

  <!-- Ambient glow -->
  <ellipse cx="256" cy="272" rx="106" ry="93" fill="#FFCD00" fill-opacity="0.12" filter="url(#glow)"/>

  <!-- Kettlebell -->
  <g transform="translate(256,245) scale(13.3) translate(-12,-10)" filter="url(#shadow)">
    <!-- Handle (stroke) -->
    <path d="M9 6a3.5 3.5 0 0 1 6 0" fill="none" stroke="#FFCD00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="9" y1="6" x2="9" y2="9.5" stroke="#FFCD00" stroke-width="2" stroke-linecap="round"/>
    <line x1="15" y1="6" x2="15" y2="9.5" stroke="#FFCD00" stroke-width="2" stroke-linecap="round"/>

    <!-- Body (filled) -->
    <circle cx="12" cy="14" r="5.5" fill="#FFCD00"/>

    <!-- Shine highlight -->
    <ellipse cx="10.5" cy="12.5" rx="2" ry="1.5" fill="#FFF" fill-opacity="0.15" transform="rotate(-15,10.5,12.5)"/>
  </g>
</svg>
