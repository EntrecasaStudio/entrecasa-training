<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1A1A1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Entrecasa Treiner</title>

  <!-- Open Graph (share thumbnail) -->
  <meta property="og:title" content="Entrecasa Treiner">
  <meta property="og:description" content="Tu plan de entrenamiento">
  <meta property="og:image" content="https://entrecasastudio.github.io/entrecasa-training/icons/og-image.svg">
  <meta property="og:type" content="website">

  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-title" content="Treiner">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon-180.png">
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png">
  <link rel="stylesheet" href="https://use.typekit.net/xnu3moa.css">
</head>
<body>
  <!-- Splash screen (shows instantly while JS loads + auth resolves) -->
  <style>
    @keyframes splash-icon-enter {
      from { opacity: 0; transform: scale(0); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes splash-text-enter {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .splash-neumorph {
      width: 120px; height: 120px; border-radius: 32px;
      background: #222;
      box-shadow:
        8px 8px 20px rgba(0,0,0,0.6),
        -6px -6px 16px rgba(60,60,60,0.15),
        inset 0 1px 0 rgba(255,255,255,0.04);
      display: flex; align-items: center; justify-content: center;
    }
  </style>
  <div id="splash" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1A1A1A;transition:opacity 0.4s ease,transform 0.4s ease;">
    <!-- 3D kettlebell container — canvas injected by splash-3d.js -->
    <div style="position:relative;opacity:0;animation:splash-icon-enter 600ms cubic-bezier(0.34,1.56,0.64,1) forwards;">
      <div class="splash-neumorph">
        <img src="/images/kettlebell-3d.png" alt="" width="120" height="120" style="display:block;pointer-events:none;">
      </div>
    </div>
    <!-- Text -->
    <div style="margin-top:20px;text-align:center;opacity:0;animation:splash-text-enter 400ms ease-out 300ms forwards;">
      <div style="font-family:system-ui,-apple-system,sans-serif;font-size:0.65rem;font-weight:400;color:rgba(245,240,232,0.5);letter-spacing:4px;text-transform:uppercase;">ENTRECASA</div>
      <div style="font-family:system-ui,-apple-system,sans-serif;font-size:1.8rem;font-weight:800;color:#F5F0E8;letter-spacing:5px;text-transform:uppercase;margin-top:2px;">TRAINER</div>
    </div>
    <!-- Progress bar (under title) -->
    <div style="width:100px;height:2px;margin-top:14px;border-radius:2px;background:rgba(255,255,255,0.06);overflow:hidden;opacity:0;animation:splash-text-enter 300ms ease-out 500ms forwards;">
      <div id="splash-progress-bar" style="height:100%;width:0%;background:linear-gradient(90deg,#ffcd00,#ffb300);border-radius:2px;transition:width 0.3s ease;"></div>
    </div>
  </div>

  <a href="#view-container" class="skip-to-content">Ir al contenido</a>
  <div id="avatar-menu-container"></div>
  <main id="app">
    <div id="view-container" tabindex="-1"></div>
  </main>
  <nav id="nav-bar"></nav>
  <div id="fab-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
