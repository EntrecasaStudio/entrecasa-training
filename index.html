<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1A1A1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Entrecasa Treiner</title>

  <!-- Open Graph (share thumbnail) -->
  <meta property="og:title" content="Entrecasa Treiner">
  <meta property="og:description" content="Tu plan de entrenamiento">
  <meta property="og:image" content="https://entrecasastudio.github.io/entrecasa-training/icons/og-image.svg">
  <meta property="og:type" content="website">

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="https://use.typekit.net/xnu3moa.css">
</head>
<body>
  <!-- Splash screen (shows instantly while JS loads + auth resolves) -->
  <style>
    @keyframes splash-icon-enter {
      from { opacity: 0; transform: scale(0); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes splash-text-enter {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes kettlebell-spin {
      from { transform: perspective(400px) rotateY(0deg); }
      to   { transform: perspective(400px) rotateY(360deg); }
    }
    @keyframes turntable-shadow {
      0%, 50%, 100% { transform: translateX(-50%) scaleX(1); opacity: 0.3; }
      25%, 75% { transform: translateX(-50%) scaleX(0.5); opacity: 0.1; }
    }
  </style>
  <div id="splash" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1A1A1A;transition:opacity 0.4s ease,transform 0.4s ease;">
    <!-- 3D Kettlebell on turntable -->
    <div style="position:relative;opacity:0;animation:splash-icon-enter 600ms cubic-bezier(0.34,1.56,0.64,1) forwards;">
      <div style="transform-style:preserve-3d;animation:kettlebell-spin 3s linear 700ms infinite;">
        <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="#FFCD00" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="filter:drop-shadow(0 0 20px rgba(255,205,0,0.3));">
          <path d="M9 5a3 3 0 0 1 6 0"/><path d="M9 5v4"/><path d="M15 5v4"/><circle cx="12" cy="14.5" r="6" fill="#FFCD00" stroke="none"/>
        </svg>
      </div>
      <!-- Turntable shadow -->
      <div style="position:absolute;bottom:-10px;left:50%;width:64px;height:10px;background:radial-gradient(ellipse,rgba(255,205,0,0.25),transparent 70%);border-radius:50%;animation:turntable-shadow 3s linear 700ms infinite;"></div>
    </div>
    <!-- Text: ENTRECASA volanta + TRAINER bold -->
    <div style="margin-top:28px;text-align:center;opacity:0;animation:splash-text-enter 400ms ease-out 400ms forwards;">
      <div style="font-family:system-ui,-apple-system,sans-serif;font-size:0.65rem;font-weight:400;color:rgba(245,240,232,0.5);letter-spacing:4px;text-transform:uppercase;">ENTRECASA</div>
      <div style="font-family:system-ui,-apple-system,sans-serif;font-size:1.8rem;font-weight:800;color:#F5F0E8;letter-spacing:5px;text-transform:uppercase;margin-top:2px;">TRAINER</div>
    </div>
  </div>

  <a href="#view-container" class="skip-to-content">Ir al contenido</a>
  <div id="avatar-menu-container"></div>
  <main id="app">
    <div id="view-container" tabindex="-1"></div>
  </main>
  <nav id="nav-bar"></nav>
  <div id="fab-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
