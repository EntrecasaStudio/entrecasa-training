<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1A1A1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Entrecasa Treiner</title>

  <!-- Open Graph (share thumbnail) -->
  <meta property="og:title" content="Entrecasa Treiner">
  <meta property="og:description" content="Tu plan de entrenamiento">
  <meta property="og:image" content="https://entrecasastudio.github.io/entrecasa-training/icons/og-image.svg">
  <meta property="og:type" content="website">

  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="https://use.typekit.net/xnu3moa.css">
</head>
<body>
  <!-- Splash screen (shows instantly while JS loads + auth resolves) -->
  <style>
    @keyframes splash-icon-enter {
      from { opacity: 0; transform: scale(0); }
      to   { opacity: 1; transform: scale(1); }
    }
    @keyframes splash-glow {
      0%, 100% { box-shadow: 0 0 30px rgba(255,205,0,0.15), 0 0 60px rgba(255,205,0,0.05); }
      50%      { box-shadow: 0 0 50px rgba(255,205,0,0.3), 0 0 100px rgba(255,205,0,0.1); }
    }
    @keyframes splash-text-enter {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
  <div id="splash" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#1A1A1A;transition:opacity 0.4s ease,transform 0.4s ease;">
    <div style="border-radius:50%;opacity:0;animation:splash-icon-enter 600ms cubic-bezier(0.34,1.56,0.64,1) forwards,splash-glow 2.5s ease-in-out 600ms infinite;">
      <svg width="72" height="72" viewBox="0 0 24 24" stroke="#FFCD00" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M9 6a3.5 3.5 0 0 1 6 0" fill="none"/><path d="M9 6v3" fill="none"/><path d="M15 6v3" fill="none"/><circle cx="12" cy="14" r="5.5" fill="#FFCD00" stroke="none"/>
      </svg>
    </div>
    <div style="margin-top:20px;font-family:system-ui,-apple-system,sans-serif;font-size:1.25rem;font-weight:300;color:#F5F0E8;letter-spacing:0.5px;opacity:0;animation:splash-text-enter 400ms ease-out 400ms forwards;">Entrecasa Treiner</div>
  </div>

  <main id="app">
    <div id="view-container"></div>
  </main>
  <nav id="nav-bar"></nav>
  <div id="fab-container"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
